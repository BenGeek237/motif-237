  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff;
      --bg2: #f8f8f6;
      --bg3: #f0ede6;
      --border: #e5e5e5;
      --text: #1a1a1a;
      --text2: #5a5a5a;
      --text3: #9a9a9a;
      --gold: #b8862e;
      --gold-light: #d4a843;
      --gold-bg: #fdf8f0;
      --green: #25D366;
      --green-dark: #1da851;
      --red: #e74c3c;
      --radius: 10px;
      --radius-lg: 14px;
      --shadow-sm: 0 1px 4px rgba(0,0,0,0.06);
      --shadow: 0 4px 16px rgba(0,0,0,0.08);
      --shadow-lg: 0 12px 32px rgba(0,0,0,0.12);
      --transition: all 0.22s ease;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg2); color: var(--text); line-height: 1.5; -webkit-font-smoothing: antialiased; }
    a { text-decoration: none; color: inherit; }

    /* ══ PROMO BAR ══ */
    .promo-bar {
      background: var(--text); color: #fff;
      text-align: center; padding: 9px 16px;
      font-size: 12.5px; font-weight: 500; letter-spacing: 0.01em;
    }
    .promo-bar span { color: var(--gold-light); font-weight: 700; }
    .promo-bar .sep { margin: 0 10px; opacity: 0.35; }

    /* ══ NAV ══ */
    nav {
      position: sticky; top: 0; z-index: 200;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      display: flex; align-items: center;
      padding: 0 20px; height: 60px; gap: 16px;
    }
    .nav-brand { font-weight: 900; text-decoration: none; color: var(--text); display: flex; align-items: center; gap: 9px; white-space: nowrap; flex-shrink: 0; }
    .nav-brand-icon { width: 36px; height: 36px; background: var(--text); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .nav-brand-text { display: flex; flex-direction: column; line-height: 1; }
    .nav-brand-name { font-size: 17px; font-weight: 900; letter-spacing: -0.5px; }
    .nav-brand-name em { color: var(--gold); font-style: normal; }
    .nav-brand-sub { font-family: 'JetBrains Mono', monospace; font-size: 8.5px; color: var(--text3); font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 1px; }
    .nav-links { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
    .nav-link { padding: 6px 13px; border-radius: 7px; font-size: 13px; font-weight: 600; color: var(--text2); transition: var(--transition); }
    .nav-link:hover { background: var(--bg2); color: var(--text); }
    .nav-link.active { color: var(--gold); }
    .nav-search { flex: 1; max-width: 380px; position: relative; }
    .nav-search svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; color: var(--text3); pointer-events: none; }
    .nav-search input { width: 100%; padding: 8px 12px 8px 34px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; font-family: inherit; background: var(--bg2); color: var(--text); outline: none; transition: var(--transition); }
    .nav-search input:focus { border-color: var(--gold); background: #fff; box-shadow: 0 0 0 3px rgba(184,134,46,0.1); }
    .nav-search input::placeholder { color: var(--text3); }
    .btn-wa-nav {
      display: flex; align-items: center; gap: 7px; flex-shrink: 0;
      background: var(--green); color: #fff; font-weight: 700; font-size: 13px;
      padding: 9px 16px; border-radius: 9px; transition: var(--transition);
      box-shadow: 0 2px 8px rgba(37,211,102,0.25);
    }
    .btn-wa-nav:hover { background: var(--green-dark); transform: translateY(-1px); }
    .btn-wa-nav svg { width: 16px; height: 16px; }

    /* ══ PAGE HEADER ══ */
    .page-header {
      background: var(--bg); border-bottom: 1px solid var(--border);
      padding: 20px 24px 16px;
    }
    .breadcrumb { font-size: 12px; color: var(--text3); margin-bottom: 6px; }
    .breadcrumb a { color: var(--text3); transition: var(--transition); }
    .breadcrumb a:hover { color: var(--text2); }
    .breadcrumb .sep { margin: 0 6px; }
    .page-header h1 { font-size: 22px; font-weight: 900; color: var(--text); }

    /* ══ MAIN LAYOUT ══ */
    .page-body {
      max-width: 1400px; margin: 0 auto;
      padding: 20px 20px 80px;
      display: flex; gap: 20px; align-items: flex-start;
    }

    /* ══ SIDEBAR ══ */
    .sidebar {
      width: 220px; flex-shrink: 0;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 16px;
      position: sticky; top: 80px;
    }
    .sidebar-section { margin-bottom: 20px; }
    .sidebar-section:last-child { margin-bottom: 0; }
    .sidebar-label {
      font-size: 10px; font-weight: 700; color: var(--text3);
      text-transform: uppercase; letter-spacing: 0.1em;
      margin-bottom: 8px; display: block;
    }
    /* Search in sidebar */
    .sidebar-search { position: relative; }
    .sidebar-search svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); width: 13px; height: 13px; color: var(--text3); pointer-events: none; }
    .sidebar-search input {
      width: 100%; padding: 7px 10px 7px 28px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 12px; font-family: inherit;
      background: var(--bg2); color: var(--text); outline: none;
      transition: var(--transition);
    }
    .sidebar-search input:focus { border-color: var(--gold); background: #fff; box-shadow: 0 0 0 3px rgba(184,134,46,0.1); }
    .sidebar-search input::placeholder { color: var(--text3); }
    /* Filter buttons */
    .filter-list { display: flex; flex-direction: column; gap: 2px; }
    .filter-item {
      width: 100%; text-align: left; padding: 7px 10px;
      border-radius: 8px; border: none; background: transparent;
      font-size: 13px; font-weight: 500; color: var(--text2);
      cursor: pointer; transition: var(--transition); font-family: inherit;
      display: flex; align-items: center; justify-content: space-between;
    }
    .filter-item:hover { background: var(--bg2); color: var(--text); }
    .filter-item.active { background: var(--text); color: #fff; font-weight: 700; }
    .filter-item.active .filter-count { opacity: 0.6; }
    .filter-count { font-size: 11px; opacity: 0.5; }
    /* Fmt filter */
    .fmt-item {
      width: 100%; text-align: left; padding: 6px 10px;
      border-radius: 7px; border: none; background: transparent;
      font-size: 12px; font-weight: 600; color: var(--text2);
      cursor: pointer; transition: var(--transition); font-family: 'JetBrains Mono', monospace;
    }
    .fmt-item:hover { background: var(--bg2); }
    .fmt-item.active { background: var(--text); color: #fff; }
    /* Modal Zoom */
    .modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); z-index:9999; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.3s ease; padding:20px; }
    .modal-overlay.active { opacity:1; pointer-events:auto; }
    .modal-content { background:#fff; border-radius:16px; overflow:hidden; max-width:500px; width:100%; transform:scale(0.9); transition:transform 0.3s ease; display:flex; flex-direction:column; max-height:90vh; }
    .modal-overlay.active .modal-content { transform:scale(1); }
    .modal-img-wrap { position:relative; width:100%; background:#f8f7f5; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .modal-img { max-height:50vh; width:100%; object-fit:contain; }
    .modal-close { position:absolute; top:12px; right:12px; background:rgba(0,0,0,0.5); color:#fff; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; font-size:20px; transition:background 0.2s; }
    .modal-close:hover { background:rgba(0,0,0,0.8); }
    .modal-body { padding:20px; overflow-y:auto; }
    .modal-cat { font-size:12px; color:var(--gold-dark); font-weight:700; text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
    .modal-name { font-size:22px; font-weight:800; color:#111; margin-bottom:12px; line-height:1.2; }
    .modal-specs { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
    .modal-spec { background:#f3f4f6; color:#4b5563; font-size:12px; font-weight:600; padding:4px 10px; border-radius:6px; font-family:'JetBrains Mono',monospace; }
    .modal-price { font-size:24px; font-weight:900; color:var(--gold-dark); margin-bottom:16px; }
    .modal-btn { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; background:#25D366; color:#fff; font-weight:700; padding:12px; border-radius:8px; text-decoration:none; transition:transform 0.2s; }
    .modal-btn:hover { transform:translateY(-2px); box-shadow:0 4px 12px rgba(37,211,102,0.3); }

    .reset-btn {
      width: 100%; padding: 8px; border-radius: 8px;
      border: 1.5px solid var(--border); background: transparent;
      font-size: 12px; font-weight: 600; color: var(--text3);
      cursor: pointer; transition: var(--transition); font-family: inherit;
    }
    .reset-btn:hover { border-color: var(--text); color: var(--text); background: var(--bg2); }

    /* ══ MAIN CONTENT ══ */
    .main-content { flex: 1; min-width: 0; }
    .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .result-count { font-size: 13px; color: var(--text2); }
    .result-count strong { color: var(--text); font-weight: 700; }
    .sort-row { display: flex; gap: 5px; }
    .sort-btn { font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 7px; border: 1.5px solid var(--border); background: #fff; color: var(--text2); cursor: pointer; transition: var(--transition); }
    .sort-btn.active { background: var(--text); color: #fff; border-color: var(--text); }
    .sort-btn:hover:not(.active) { border-color: var(--gold); color: var(--gold); }

    /* ══ PRODUCT GRID ══ */
    .motif-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    @media (min-width: 560px)  { .motif-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 1100px) { .motif-grid { grid-template-columns: repeat(4, 1fr); } }

    /* ══ PRODUCT CARD ══ */
    .product-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; cursor: pointer; transition: var(--transition); box-shadow: var(--shadow-sm); }
    .product-card:hover { border-color: #ccc; box-shadow: var(--shadow-lg); transform: translateY(-4px); }
    .card-img { position: relative; aspect-ratio: 1; overflow: hidden; background: var(--bg2); }
    .card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.45s ease; display: block; }
    .product-card:hover .card-img img { transform: scale(1.07); }
    .badge-top { position: absolute; top: 8px; left: 8px; background: var(--text); color: var(--gold-light); font-size: 9px; font-weight: 800; padding: 3px 7px; border-radius: 4px; letter-spacing: 0.06em; }
    .badge-niveau { position: absolute; top: 8px; right: 8px; font-size: 9px; font-weight: 700; padding: 3px 7px; border-radius: 4px; }
    .badge-debutant { background: #dcfce7; color: #166534; }
    .badge-standard { background: #dbeafe; color: #1e40af; }
    .badge-avance   { background: #f3e8ff; color: #6b21a8; }
    .card-body { padding: 11px 12px 13px; }
    .card-cat { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
    .card-name { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.35; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-bottom { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
    .card-price { font-size: 15px; font-weight: 900; color: var(--gold); }
    .card-price small { font-size: 10px; font-weight: 600; color: var(--text3); margin-left: 2px; }
    .card-btns { display: flex; gap: 5px; }
    .btn-wa-card { display: flex; align-items: center; justify-content: center; gap: 6px; background: var(--green); color: #fff; font-weight: 800; font-size: 13px; padding: 10px 14px; border-radius: 9px; border: none; cursor: pointer; transition: var(--transition); white-space: nowrap; flex: 1; box-shadow: 0 2px 8px rgba(37,211,102,0.25); }
    .btn-wa-card:hover { background: var(--green-dark); transform: translateY(-1px); }
    .btn-wa-card svg { width: 15px; height: 15px; }
    @keyframes cardEnter { from { opacity:0; transform:scale(0.97) translateY(8px); } to { opacity:1; transform:none; } }
    .card-enter { animation: cardEnter 0.3s ease forwards; }

    /* ══ FOOTER ══ */
    footer { background: var(--text); color: #9a9a9a; padding: 40px 20px 28px; margin-top: 40px; }
    .footer-grid { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 32px; margin-bottom: 32px; }
    @media (max-width: 640px) { .footer-grid { grid-template-columns: 1fr; } }
    .footer-brand-name { font-size: 20px; font-weight: 900; color: #fff; margin-bottom: 6px; }
    .footer-brand-name em { color: var(--gold-light); font-style: normal; }
    .footer-bottom { border-top: 1px solid #2a2a2a; padding-top: 20px; text-align: center; font-size: 12px; }

    /* ══ WA FLOAT ══ */
    #wa-float { position: fixed; bottom: 22px; right: 18px; z-index: 250; width: 58px; height: 58px; border-radius: 50%; background: var(--green); display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(37,211,102,0.45); }
    #wa-float:hover { background: var(--green-dark); }
    #wa-float svg { width: 30px; height: 30px; color: #fff; }

  </style>
</head>

</a>

<script src="js/app.js"></script>
<script>
  
  let allMotifs = [], currentCat = 'Tous', currentFmt = '', currentSort = 'default', currentSearch = '';

  async function load() {
    allMotifs = await DataService.fetchAll();

  function buildCatFilter() {
    const customOrder = ['Homme', 'Femme', 'Gandoura', 'Enfant', 'Logo', 'Autres'];
    const existingCats = [...new Set(allMotifs.map(m => m.categorie).filter(Boolean))];
    existingCats.sort((a, b) => {
      let idxA = customOrder.indexOf(a), idxB = customOrder.indexOf(b);
      if (idxA === -1) idxA = 999;
      if (idxB === -1) idxB = 999;
      return idxA - idxB || a.localeCompare(b);
    });
    const cats = ['Tous', ...existingCats];
    // Sidebar (desktop)
    document.getElementById('cat-filter').innerHTML = cats.map(c => `
      <button onclick="setCat('${c}')" data-cat="${c}"
              class="filter-item ${c === currentCat ? 'active' : ''}">
        ${c} <span class="filter-count">${c === 'Tous' ? allMotifs.length : allMotifs.filter(m=>m.categorie===c).length}</span>
      </button>`).join('');
    // Chips mobile
    document.getElementById('mobile-cats').innerHTML = cats.map(c => `
      <button class="cat-chip ${c === currentCat ? 'active' : ''}" onclick="setCat('${c}')" data-mobile-cat="${c}">${c}</button>
    `).join('');
  }


  function buildFmtFilter() {
    const fmts = [...new Set(allMotifs.flatMap(m => m.formats || []))].sort();
    document.getElementById('fmt-filter').innerHTML = fmts.map(f =>
      `<button onclick="setFmt('${f}')" data-fmt="${f}"
               class="fmt-item ${f === currentFmt ? 'active' : ''}">.${f}</button>`
    ).join('');
  }

  function buildNiveauFilter() {
    const niveaux = [...new Set(allMotifs.map(m => m.niveau).filter(Boolean))];
    document.getElementById('niveau-filter').innerHTML = niveaux.map(n =>
      `<button onclick="setNiveau('${n}')" data-niv="${n}"
               class="filter-item ${n === currentNiveau ? 'active' : ''}" style="font-size:12px">${n}</button>`
    ).join('');
  }

  function initSortBtns() {
    document.querySelectorAll('.sort-btn').forEach(btn => btn.addEventListener('click', () => {
      currentSort = btn.dataset.sort;
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid();
    }));
  }

  function setCat(cat) {
    currentCat = cat;
    document.querySelectorAll('[data-cat]').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
    document.querySelectorAll('[data-mobile-cat]').forEach(b => b.classList.toggle('active', b.dataset.mobileCat === cat));
    renderGrid();
  }

  function setFmt(fmt) {
    currentFmt = currentFmt === fmt ? '' : fmt;
    document.querySelectorAll('[data-fmt]').forEach(b => b.classList.toggle('active', b.dataset.fmt === currentFmt));
    renderGrid();
  }
  function setNiveau(n) {
    currentNiveau = currentNiveau === n ? '' : n;
    document.querySelectorAll('[data-niv]').forEach(b => b.classList.toggle('active', b.dataset.niv === currentNiveau));
    renderGrid();
  }
  function resetFilters() {
    currentCat = 'Tous'; currentFmt = ''; currentNiveau = ''; currentSearch = ''; currentSort = 'default';
    document.getElementById('search-input').value = '';
    document.getElementById('nav-search-input').value = '';
    document.querySelectorAll('.sort-btn').forEach((b,i) => b.classList.toggle('active', i===0));
    buildCatFilter(); buildFmtFilter(); buildNiveauFilter(); renderGrid();
  }

  function renderGrid() {
    let filtered = allMotifs;
    if (currentCat !== 'Tous') filtered = filtered.filter(m => m.categorie === currentCat);
    if (currentFmt) filtered = filtered.filter(m => m.formats?.includes(currentFmt));
    if (currentNiveau) filtered = filtered.filter(m => m.niveau === currentNiveau);
    if (currentSearch.trim()) {
      const q = currentSearch.toLowerCase();
      filtered = filtered.filter(m =>
        m.nom.toLowerCase().includes(q) || m.description.toLowerCase().includes(q) ||
        m.categorie.toLowerCase().includes(q) || m.formats?.some(f => f.toLowerCase().includes(q)) ||
        m.machines_compatibles?.some(mc => mc.toLowerCase().includes(q)) ||
        m.tags?.some(t => t.toLowerCase().includes(q))
      );
    }
    if (currentSort === 'prix-asc')  filtered = [...filtered].sort((a,b) => (a.prix||0)-(b.prix||0));
    if (currentSort === 'prix-desc') filtered = [...filtered].sort((a,b) => (b.prix||0)-(a.prix||0));
    if (currentSort === 'points')    filtered = [...filtered].sort((a,b) => (b.points||0)-(a.points||0));

    const grid  = document.getElementById('motif-grid');
    const empty = document.getElementById('empty-state');
    document.getElementById('result-count').innerHTML = `<strong>${filtered.length}</strong> fichier${filtered.length > 1 ? 's' : ''} trouvé${filtered.length > 1 ? 's' : ''}`;

    if (!filtered.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    grid.innerHTML = filtered.map((m, i) => `
      <div class="card-enter" style="animation-delay:${i * 0.04}s">
        ${renderCard(m)}
      </div>`).join('');
  }

  function renderCard(m) {
    const nCls = {'D\u00e9butant':'badge-debutant','Standard':'badge-standard','Avanc\u00e9':'badge-avance'}[m.niveau] || '';
    const detailUrl = `/motif.html?id=${m.id}`;
    const imgUrl = m.image.startsWith('http') || m.image.startsWith('/') ? m.image : '/' + m.image;
    return `
      <div class="product-card" onclick="window.location.href='${detailUrl}'" aria-label="${m.nom}">
        <div class="card-img">
          <img src="${imgUrl}" alt="${m.nom}" loading="lazy" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
          ${m.vedette ? '<span class="badge-top">\u2605 TOP</span>' : ''}
          ${m.niveau  ? `<span class="badge-niveau ${nCls}">${m.niveau}</span>` : ''}
        </div>
        <div class="card-body">
          <div class="card-cat">${m.categorie}</div>
          <div class="card-name">${m.nom}</div>
          <div class="card-bottom">
            <div class="card-price">${m.prix ? `${m.prix.toLocaleString('fr')} <small>FCFA</small>` : ''}</div>
            <div class="card-btns">
              <a href="${detailUrl}"
                 onclick="event.stopPropagation()" class="btn-wa-card" style="background:#f59e0b; box-shadow:0 2px 8px rgba(245,158,11,0.25);" aria-label="Acheter ${m.nom}">
                💳 Acheter
              </a>
            </div>
          </div>
        </div>
      </div>`;
  }


  // Synchro recherche nav ↔ sidebar
  function syncSearch(val) { currentSearch = val; renderGrid(); }
  let st;
  document.getElementById('search-input').addEventListener('input', e => {
    clearTimeout(st);
    document.getElementById('nav-search-input').value = e.target.value;
    st = setTimeout(() => syncSearch(e.target.value), 280);
  });
  document.getElementById('nav-search-input').addEventListener('input', e => {
    clearTimeout(st);
    document.getElementById('search-input').value = e.target.value;
    st = setTimeout(() => syncSearch(e.target.value), 280);
  });

  // Menu mobile
  function toggleMenu() {
    document.getElementById('mobile-menu').classList.toggle('open');
  }

  // Drawer
  function openDrawer() {
    document.getElementById('drawer-overlay').classList.add('open');
    document.getElementById('mobile-drawer').classList.add('open');
    // Copier le contenu de la sidebar dans le drawer si pas déjà fait
    if (!document.getElementById('drawer-filters').innerHTML) {
      document.getElementById('drawer-filters').innerHTML = document.querySelector('.sidebar').innerHTML;
    }
  }
  function closeDrawer() {
    document.getElementById('drawer-overlay').classList.remove('open');
    document.getElementById('mobile-drawer').classList.remove('open');
  }

  window.setCat = setCat; window.setFmt = setFmt; window.setNiveau = setNiveau; window.resetFilters = resetFilters; window.openDrawer = openDrawer; window.closeDrawer = closeDrawer;
  load();
</script>
</body>
</html>
