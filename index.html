  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fff;
      --bg2: #f8f8f6;
      --border: #e5e5e5;
      --text: #1a1a1a;
      --text2: #5a5a5a;
      --text3: #9a9a9a;
      --gold: #b8862e;
      --gold-light: #d4a843;
      --gold-bg: #fdf8f0;
      --green: #25D366;
      --green-dark: #1da851;
      --t: all 0.22s ease;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg2); color: var(--text); -webkit-font-smoothing: antialiased; }
    a { text-decoration: none; color: inherit; }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 200;
      background: var(--bg); border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      display: flex; align-items: center;
      padding: 0 20px; height: 60px; gap: 14px;
    }
    .logo {
      display: flex; align-items: center; gap: 9px;
      font-weight: 900; white-space: nowrap; flex-shrink: 0;
    }
    .logo-icon {
      width: 36px; height: 36px; background: var(--text);
      border-radius: 9px; display: flex; align-items: center;
      justify-content: center; font-size: 18px;
    }
    .logo-name { font-size: 17px; font-weight: 900; letter-spacing: -.5px; }
    .logo-name em { color: var(--gold); font-style: normal; }
    .logo-sub { font-family: 'JetBrains Mono', monospace; font-size: 8px; color: var(--text3); font-weight: 500; letter-spacing: .12em; text-transform: uppercase; margin-top: 1px; }
    .search-wrap { flex: 1; max-width: 380px; position: relative; }
    .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; color: var(--text3); pointer-events: none; }
    .search-wrap input { width: 100%; padding: 8px 12px 8px 34px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; font-family: inherit; background: var(--bg2); color: var(--text); outline: none; transition: var(--t); }
    .search-wrap input:focus { border-color: var(--gold); background: #fff; box-shadow: 0 0 0 3px rgba(184,134,46,.1); }
    .search-wrap input::placeholder { color: var(--text3); }
    .btn-wa-nav {
      display: flex; align-items: center; gap: 7px; flex-shrink: 0;
      background: var(--green); color: #fff; font-weight: 700; font-size: 13px;
      padding: 9px 16px; border-radius: 9px; transition: var(--t);
      box-shadow: 0 2px 8px rgba(37,211,102,.25);
    }
    .btn-wa-nav:hover { background: var(--green-dark); transform: translateY(-1px); }
    .btn-wa-nav svg { width: 16px; height: 16px; }

    /* ── WELCOME STRIP ── */
    .welcome {
      background: var(--gold-bg); border-bottom: 1px solid #eddfc0;
      padding: 9px 20px;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 6px;
    }
    .welcome-msg { font-size: 13px; color: var(--text2); }
    .welcome-msg strong { color: var(--text); }
    .welcome-tags { display: flex; flex-wrap: wrap; gap: 10px; }
    .welcome-tag { font-size: 11.5px; font-weight: 600; color: var(--text3); display: flex; align-items: center; gap: 4px; }
    .welcome-tag b { color: var(--text2); }

    /* ── CHIPS CATÉGORIE ── */
    .cats {
      background: var(--bg); border-bottom: 1px solid var(--border);
      padding: 0 20px; overflow-x: auto; -webkit-overflow-scrolling: touch;
      display: flex; align-items: center; gap: 6px; height: 50px;
      scrollbar-width: none;
    }
    .cats::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0; padding: 6px 16px; border-radius: 999px;
      font-size: 13px; font-weight: 600;
      border: 1.5px solid var(--border);
      background: #fff; color: var(--text2);
      cursor: pointer; transition: var(--t); white-space: nowrap;
      font-family: inherit;
    }
    .chip:hover { border-color: var(--gold); color: var(--gold); }
    .chip.active { background: var(--text); color: #fff; border-color: var(--text); }

    /* ── TOOLBAR ── */
    .toolbar {
      padding: 11px 20px;
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .count { font-size: 13px; color: var(--text2); }
    .count strong { color: var(--text); font-weight: 700; }
    .sort-row { display: flex; gap: 5px; }
    .sort-btn {
      font-size: 12px; font-weight: 600; padding: 5px 11px;
      border-radius: 7px; border: 1.5px solid var(--border);
      background: #fff; color: var(--text2); cursor: pointer; transition: var(--t); font-family: inherit;
    }
    .sort-btn.active { background: var(--text); color: #fff; border-color: var(--text); }
    .sort-btn:hover:not(.active) { border-color: var(--gold); color: var(--gold); }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px; padding: 0 12px 100px;
    }
    @media (min-width: 520px)  { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 800px)  { .grid { grid-template-columns: repeat(4, 1fr); gap: 16px; padding: 0 20px 100px; } }
    @media (min-width: 1100px) { .grid { grid-template-columns: repeat(5, 1fr); } }
    @media (min-width: 1400px) { .grid { grid-template-columns: repeat(6, 1fr); } }

    /* ── CARTE ── */
    .card { background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 4px 15px rgba(0,0,0,0.04); transition:transform 0.2s, box-shadow 0.2s; position:relative; cursor:pointer; }
    .card:hover { transform:translateY(-4px); box-shadow:0 12px 25px rgba(0,0,0,0.08); }

    .card-img {
      position: relative; aspect-ratio: 1;
      overflow: hidden; background: var(--bg2);
    }
    .card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform .45s ease; display: block; }
    .card:hover .card-img img { transform: scale(1.07); }

    /* Hover overlay */
    .card-overlay {
      position: absolute; inset: 0;
      background: rgba(10,10,10,.42);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity .22s ease;
    }
    .card:hover .card-overlay { opacity: 1; }
    .overlay-btn {
      display: flex; align-items: center; gap: 7px;
      background: var(--green); color: #fff;
      font-weight: 800; font-size: 13px;
      padding: 11px 20px; border-radius: 999px;
      border: none; cursor: pointer; font-family: inherit;
      transform: translateY(6px); transition: transform .22s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,.3); text-decoration: none;
    }
    .card:hover .overlay-btn { transform: translateY(0); }
    .overlay-btn svg { width: 15px; height: 15px; }

    /* Badges image */
    .badge-top { position: absolute; top: 8px; left: 8px; background: var(--text); color: var(--gold-light); font-size: 9px; font-weight: 800; padding: 3px 7px; border-radius: 4px; letter-spacing: .06em; }

    /* Corps de la carte */
    .card-body { padding: 11px 12px 13px; }
    .card-cat { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
    .card-name { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.35; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-specs { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 6px; }
    .spec { font-size: 10.5px; color: var(--text3); }
    .spec + .spec::before { content: '·'; margin-right: 3px; color: var(--border); }
    .card-fmts { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 10px; }
    .fmt { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; font-weight: 600; padding: 2px 7px; border-radius: 4px; }
    .fmt-DST { background:#fef3c7; color:#92400e; }
    .fmt-JEF { background:#dbeafe; color:#1e40af; }
    .fmt-PES { background:#dcfce7; color:#166534; }
    .fmt-DSB { background:#fee2e2; color:#991b1b; }
    .fmt-EXP { background:#f3e8ff; color:#6b21a8; }
    .fmt-HUS { background:#fce7f3; color:#9d174d; }
    .fmt-VP3 { background:#e0f2fe; color:#075985; }
    .card-bottom { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .card-price { font-size: 15px; font-weight: 900; color: var(--gold); }
    .card-price small { font-size: 10px; font-weight: 600; color: var(--text3); margin-left: 2px; }
    .card-action {
      display: flex; align-items: center; gap: 5px;
      background: var(--green); color: #fff;
      font-weight: 700; font-size: 11.5px;
      padding: 7px 12px; border-radius: 7px;
      border: none; cursor: pointer; transition: var(--t);
      white-space: nowrap; font-family: inherit; text-decoration: none;
    }
    .card-action:hover { background: var(--green-dark); }
    .card-action svg { width: 13px; height: 13px; }

    /* Sur mobile touch : overlay toujours visible */
    @media (hover: none) {
      .card-overlay { opacity: 1; background: rgba(0,0,0,.15); }
      .overlay-btn { transform: none; padding: 8px 12px; font-size: 11px; }
    }

    /* ── SKELETON ── */
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .skeleton { border: 1px solid var(--border); border-radius: 14px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .sk-img { aspect-ratio: 1; background: linear-gradient(90deg, #f0f0f0 25%, #e6e6e6 50%, #f0f0f0 75%); background-size: 200%; animation: shimmer 1.4s infinite; }
    .sk-body { padding: 11px 12px; }
    .sk-line { height: 11px; border-radius: 4px; background: #f0f0f0; margin-bottom: 7px; }
    .sk-line.w50 { width: 50%; } .sk-line.w80 { width: 80%; } .sk-line.h14 { height: 14px; }
    .sk-btn { height: 32px; border-radius: 7px; background: #ebebeb; }

    /* ── EMPTY ── */
    #empty { display: none; text-align: center; padding: 70px 20px; }
    #empty .ico { font-size: 52px; margin-bottom: 14px; }
    #empty h3 { font-size: 19px; font-weight: 800; margin-bottom: 6px; }
    #empty p { font-size: 14px; color: var(--text2); margin-bottom: 18px; }
    #empty button { padding: 10px 26px; background: var(--text); color: #fff; border: none; border-radius: 9px; font-weight: 700; font-size: 14px; cursor: pointer; font-family: inherit; }

    /* ── WA FLOAT ── */
    #wa-float {
      position: fixed; bottom: 22px; right: 18px; z-index: 250;
      width: 58px; height: 58px; border-radius: 50%;
      background: var(--green);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(37,211,102,.45);
      text-decoration: none;
      animation: pulse 2.5s ease-in-out infinite;
    }
    #wa-float:hover { background: var(--green-dark); transform: scale(1.08); }
    @keyframes pulse { 0%,100%{box-shadow:0 4px 20px rgba(37,211,102,.45)} 50%{box-shadow:0 4px 28px rgba(37,211,102,.7)} }
    #wa-float svg { width: 30px; height: 30px; color: #fff; }

    /* ── RESPONSIVE ── */
    @media (max-width: 680px) {
      .logo-sub { display: none; }
      .btn-wa-nav .wa-label { display: none; }
      .btn-wa-nav { padding: 9px; border-radius: 50%; }
      .welcome { display: none; }
    }
    @media (max-width: 480px) { .sort-row { display: none; } }
  </style>
</head>

  const WA = '237693565223';
  let all = [], cat = 'Tous', q = '', sort = 'default';

  const WA_SVG = `<svg fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>`;

  function waLink(nom, prix) {

  function card(m) {

    return `

              ${WA_SVG} Commander

          </div>
        </div>
      </div>`;

  function applySort(arr) {
    if (sort === 'prix-asc')  return [...arr].sort((a,b) => (a.prix||0)-(b.prix||0));

    if (sort === 'points')    return [...arr].sort((a,b) => (b.points||0)-(a.points||0));
    return arr;
  }

  function render() {
    let list = all;
    if (cat !== 'Tous') list = list.filter(m => m.categorie === cat);
    if (q) {
      const s = q.toLowerCase();
      list = list.filter(m =>
        m.nom.toLowerCase().includes(s) ||
        m.categorie.toLowerCase().includes(s) ||
        (m.formats||[]).some(f => f.toLowerCase().includes(s)) ||
        (m.tags||[]).some(t => t.toLowerCase().includes(s))
      );
    }
    list = applySort(list);

    document.getElementById('count').innerHTML = `<strong>${list.length}</strong> design${list.length > 1 ? 's' : ''}`;
    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    if (!list.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    grid.innerHTML = list.map(m => card(m)).join('');
  }

  function buildCats() {
    const customOrder = ['Homme', 'Femme', 'Gandoura', 'Enfant', 'Logo', 'Autres'];
    const existingCats = [...new Set(all.map(m => m.categorie).filter(Boolean))];
    existingCats.sort((a, b) => {
      let idxA = customOrder.indexOf(a), idxB = customOrder.indexOf(b);
      if (idxA === -1) idxA = 999;
      if (idxB === -1) idxB = 999;
      return idxA - idxB || a.localeCompare(b);
    });
    const cats = ['Tous', ...existingCats];
    document.getElementById('cats').innerHTML = cats.map(c =>
      `<button class="chip${c === cat ? ' active' : ''}" onclick="setCat('${c}')">${c}</button>`
    ).join('');
  }

  function setCat(c) {
    cat = c;
    document.querySelectorAll('.chip').forEach(b => b.classList.toggle('active', b.textContent === c));
    render();
  }

  function reset() {
    cat = 'Tous'; q = ''; sort = 'default';
    document.getElementById('search').value = '';
    document.querySelectorAll('.sort-btn').forEach((b,i) => b.classList.toggle('active', i === 0));
    buildCats(); render();
  }
  window.reset = reset;

  // Sort
  document.querySelectorAll('.sort-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      sort = btn.dataset.sort;
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  // Search
  let st;
  document.getElementById('search').addEventListener('input', e => {
    clearTimeout(st);
    st = setTimeout(() => { q = e.target.value.trim(); render(); }, 280);
  });

  async function init() {
    const res = await fetch(`data/motifs.json?v=${new Date().getTime()}`);
    const data = await res.json();
    // Support Decap CMS wrapper object or raw array
    all = Array.isArray(data) ? data : (data.motifs || []);
    buildCats();
    render();
  }
  init();

  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      }
    });
  }
</script>
</body>
</html>
